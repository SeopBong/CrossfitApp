<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 class="pre-title">숫자 맞추기 겜임!</h1>
        <h1 class="title">술게임</h1>
        <h1 class="sub-title"><span class="red-text">죽음</span>의 업 & 다운</h1>
        <div id="result-area">
            <img src="https://golden-goblin.com/content-thief/wp-content/uploads/sites/5/kboard_attached/1/202109/6136e227e0bfb1629295.gif" class="main-img">
            <h1 class="result-text">마시기 싫다면 맞춰야겠지?</h1>
        </div>
        <div id="chance-area">남은 찬스:</div>
        <div class="row d-flex justify-content-center">
            <div class="col-md-6"></div>
            <input type="number" id="user-input" class="from-control md 10" placeholder="1부터 100까지 숫자를 입력">
        </div>
       
        
        <button id="play-button">Go!</button>
    </div>
   
    <button class="btn btn=warning mt-43 button-style reset-button">리셋!</button>



    <script src="main.js"></script>
    
</body>
</html>
